<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR平面いけす＆ストーリー</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      /* 起動前の許可ボタン（画面中央に表示） */
      #start-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
        text-align: center;
      }
      #start-button {
        padding: 15px 30px;
        font-size: 18px;
        background-color: #00a2ff;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 20px;
        box-shadow: 0 4px 10px rgba(0,162,255,0.4);
      }
      #ar-instructions {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 10;
        pointer-events: none;
        text-align: center;
        display: none; /* 最初は非表示 */
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <div id="start-screen">
      <h2 style="margin: 0 20px;">ARいけすへようこそ</h2>
      <p style="font-size: 14px; color: #ccc; margin: 10px 20px;">カメラとセンサーの許可が必要です</p>
      <button id="start-button">ARを起動する</button>
    </div>

    <div id="ar-instructions">スマホをゆっくり左右に動かして、テーブルを検知してください</div>

    <a-scene 
      embedded
      webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local;" 
      xr-mode-ui="enabled: true; XRMode: ar;" 
      renderer="alpha: true; colorManagement: true;"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
      </a-assets>

      <a-entity id="reticle" ar-hit-test="target: #aquarium-group">
        <a-ring color="#00ffff" rotation="-90 0 0" radius-inner="0.15" radius-outer="0.2" visible="false"></a-ring>
      </a-entity>

      <a-entity id="aquarium-group" position="0 0 0" visible="false">
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="1 1 1" 
          position="0 0.1 0">
        </a-entity>
        <a-ring color="#00a2ff" rotation="-90 0 0" radius-inner="0.8" radius-outer="0.82" opacity="0.5"></a-ring>
      </a-entity>

      <a-entity camera position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startScreen = document.querySelector('#start-screen');
      const startButton = document.querySelector('#start-button');
      const reticle = document.querySelector('#reticle');
      const aquariumGroup = document.querySelector('#aquarium-group');
      const instructions = document.querySelector('#ar-instructions');
      const fish = document.querySelector('#my-fish');
      
      let angle = 0;
      let isPlaced = false;

      // スタートボタンが押された時の処理
      startButton.addEventListener('click', () => {
        // iOS特有のセンサーアクセス許可を求める（無ければスルーされる）
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
              if (permissionState === 'granted') {
                startAR();
              } else {
                alert('センサーの許可が拒否されました。設定から許可してください。');
              }
            })
            .catch(console.error);
        } else {
          startAR();
        }
      });

      function startAR() {
        // スタート画面を消し、案内を表示する
        startScreen.style.display = 'none';
        instructions.style.display = 'block';
        
        // A-FrameのARモードを強制起動する
        sceneEl.enterVR();
      }

      // 1. 平面検知（WebXR Hit Test）の処理
      sceneEl.addEventListener('enter-vr', () => {
        if (sceneEl.is('ar-mode')) {
          const session = sceneEl.xrSession;
          session.requestReferenceSpace('viewer').then((refSpace) => {
            session.requestHitTestSource({ space: refSpace }).then((source) => {
              sceneEl.hitTestSource = source;
            });
          });
          session.requestReferenceSpace('local-floor').then((refSpace) => {
            sceneEl.localFloorSpace = refSpace;
          });
        }
      });

      sceneEl.addEventListener('renderstart', () => {
        const renderer = sceneEl.renderer;
        renderer.xr.addEventListener('sessionstart', () => {
          renderer.xr.getSession().addEventListener('select', onSelect);
        });
      });

      // 毎フレームの描画（無限に泳がせる）
      function tick() {
        requestAnimationFrame(tick);

        if (fish && fish.object3D && isPlaced) {
          angle += 0.015; // 泳ぐ速度

          // 机の上を綺麗な円を描いて泳がせる
          fish.object3D.position.x = Math.cos(angle) * 0.6;
          fish.object3D.position.z = Math.sin(angle) * 0.6;

          // 魚の頭を常に進行方向に向ける回転処理
          fish.object3D.rotation.y = -angle + Math.PI / 2;
        }

        // レティクルの表示制御
        if (sceneEl.is('ar-mode') && !isPlaced) {
          const frame = sceneEl.frame;
          if (sceneEl.hitTestSource && frame) {
            const hitTestResults = frame.getHitTestResults(sceneEl.hitTestSource);
            if (hitTestResults.length > 0) {
              const hit = hitTestResults[0];
              const pose = hit.getPose(sceneEl.localFloorSpace);
              
              reticle.setAttribute('visible', 'true');
              reticle.object3D.position.copy(pose.transform.position);
              reticle.object3D.quaternion.copy(pose.transform.orientation);
              
              instructions.innerText = "画面をタップして、いけすを設置！";
            } else {
              reticle.setAttribute('visible', 'false');
            }
          }
        }
      }
      tick();

      // 画面タップで設置
      function onSelect() {
        if (!isPlaced && reticle.getAttribute('visible') === 'true') {
          aquariumGroup.object3D.position.copy(reticle.object3D.position);
          aquariumGroup.setAttribute('visible', 'true');
          
          isPlaced = true;
          reticle.setAttribute('visible', 'false');
          instructions.style.display = 'none';
        }
      }
    </script>
  </body>
</html>
