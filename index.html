<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Aquarium</title>
    <!-- 通常の1画面カメラARを起動するための安定ライブラリ -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <!-- VRモードやデバッグ表示を完全にオフにし、1画面のスマホカメラを背景にします -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
      </a-assets>

      <!-- 
        【タイのみを配置】
        カメラから2.5メートル奥、0.8メートル下の位置を基準にします。
        光るパス（リング）などの余計なビジュアルオブジェクトはすべて排除しました。
      -->
      <a-entity id="aquarium-space" position="0 -0.8 -2.5">
        
        <!-- タイの3Dモデル（ちょうどいいサイズ） -->
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="0.12 0.12 0.12" 
          position="0 0 0">
        </a-entity>

      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const fish = document.querySelector('#my-fish');
      
      // 🐟 自律遊泳パラメーター
      let posX = 0;       // 現在のX位置
      let posZ = 0;       // 現在のZ位置
      let speed = 0.008;  // 泳ぐスピード
      let direction = Math.random() * Math.PI * 2; // 進む方角
      let turnSpeed = 0;  // 旋回スピード
      const limitRadius = 1.3; // 泳ぎ回る範囲の限界半径

      function animate() {
        requestAnimationFrame(animate);

        if (fish && fish.object3D) {
          // 1. 進む方向をランダムに少しずつ揺らして、魚らしい不規則な動きを作る
          turnSpeed += (Math.random() - 0.5) * 0.05;
          turnSpeed = Math.max(-0.04, Math.min(0.04, turnSpeed)); // 急旋回しすぎないよう制限
          direction += turnSpeed;

          // 2. 現在の方角に向かって進む
          posX += Math.cos(direction) * speed;
          posZ += Math.sin(direction) * speed;

          // 3. 一定の範囲（いけすの境界）を出そうになったら、自動で中央に向きを戻す
          const distanceFromCenter = Math.sqrt(posX * posX + posZ * posZ);
          if (distanceFromCenter > limitRadius) {
            const angleToCenter = Math.atan2(-posZ, -posX);
            direction = angleToCenter + (Math.random() - 0.5) * 0.5;
            turnSpeed = 0;
          }

          // 4. 3Dモデルの位置を更新
          fish.object3D.position.x = posX;
          fish.object3D.position.z = posZ;

          // 5. 進行方向に頭を向けつつ、尾ひれをくねくね動かすブレ（wiggle）をリアルタイムに計算して合成
          const wiggle = Math.sin(posX * 15 + posZ * 15) * 0.08;
          fish.object3D.rotation.y = -direction + Math.PI / 2 + wiggle;
        }
      }

      animate();
    </script>
  </body>
</html>
