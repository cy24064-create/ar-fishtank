<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360度 デジタル水族館</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
      
      #webcam-bg {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      #ar-scene-container {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 2;
      }

      #start-screen {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0, 20, 40, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 40px;
        font-size: 18px;
        background: #00a2ff;
        color: white;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,162,255,0.5);
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- 現実のカメラ背景 -->
    <video id="webcam-bg" autoplay playsinline muted></video>

    <!-- スタート画面 -->
    <div id="start-screen">
      <h2 style="margin-bottom: 10px;">デジタル水族館</h2>
      <p style="font-size: 14px; color: #aaa; margin-bottom: 30px;">
        ※カメラとセンサーの許可が必要です
      </p>
      <button id="start-btn">スタート</button>
    </div>

    <!-- 3D空間 -->
    <div id="ar-scene-container">
      <a-scene 
        embedded 
        renderer="alpha: true; colorManagement: true; precision: high; antialias: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
          <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
        </a-assets>

        <!-- スマホの向きと連動 -->
        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: false; mouseEnabled: false;"></a-entity>

        <!-- タイ（初期位置はカメラの少し前） -->
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="0.12 0.12 0.12" 
          position="0 0 -2"
          animation-mixer>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>
      </a-scene>
    </div>

    <script>
      const startBtn = document.getElementById('start-btn');
      const startScreen = document.getElementById('start-screen');
      const webcam = document.getElementById('webcam-bg');
      const fish = document.querySelector('#my-fish');

      // 画質の向上と透過バグ修正
      fish.addEventListener('model-loaded', () => {
        const mesh = fish.getObject3D('mesh');
        if (mesh) {
          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material.side = THREE.DoubleSide;
              node.material.transparent = false;
              node.material.depthWrite = true;
              if (node.material.map) {
                node.material.map.minFilter = THREE.LinearMipmapLinearFilter;
                node.material.map.magFilter = THREE.LinearFilter;
                node.material.map.needsUpdate = true;
              }
              node.material.needsUpdate = true;
            }
          });
        }
      });

      // 🐟 不規則でなめらかな縦横無尽アルゴリズム（Boids風ステアリング）
      const velocity = new THREE.Vector3(0, 0, -0.01); // 初期の進行方向
      const acceleration = new THREE.Vector3();
      const dummy = new THREE.Object3D(); // 向き計算用の透明なダミー

      function animate() {
        requestAnimationFrame(animate);
        
        if (fish && fish.object3D) {
          const obj = fish.object3D;

          // 1. ランダムに方向を変えようとする力（少しずつ不規則に動く）
          const wanderX = (Math.random() - 0.5) * 0.0006;
          const wanderY = (Math.random() - 0.5) * 0.0003; // 上下は少し控えめに
          const wanderZ = (Math.random() - 0.5) * 0.0006;
          acceleration.add(new THREE.Vector3(wanderX, wanderY, wanderZ));

          // 2. 見失わないための空間制御（離れすぎたら戻し、近すぎたら離す）
          const dist = obj.position.length();
          if (dist > 3.0) {
            // 3m以上離れたら中心へ向かう力を加える
            acceleration.add(obj.position.clone().normalize().multiplyScalar(-0.0005));
          } else if (dist < 1.0) {
            // 1m以内に来たら外へ逃げる
            acceleration.add(obj.position.clone().normalize().multiplyScalar(0.0005));
          }

          // 上下の限界（高すぎず低すぎず）
          if (obj.position.y > 0.8) {
            acceleration.y -= 0.0003;
          } else if (obj.position.y < -0.8) {
            acceleration.y += 0.0003;
          }

          // 3. スピードの計算と反映
          velocity.add(acceleration);
          velocity.clampLength(0.005, 0.012); // ゆったり泳ぐスピード（最小〜最大）
          obj.position.add(velocity);
          acceleration.set(0, 0, 0); // 力をリセット

          // 4. なめらかな方向転換（進んでいる方向へ頭を向ける）
          const targetPos = obj.position.clone().add(velocity);
          dummy.position.copy(obj.position);
          dummy.lookAt(targetPos);
          
          // モデルの向き補正（もし横向きや後ろ向きに泳ぐ場合は、ここを -Math.PI / 2 などに変更します）
          dummy.rotateY(Math.PI / 2); 

          // 現在の向きから目標の向きへ、なめらかに体を回転させる
          obj.quaternion.slerp(dummy.quaternion, 0.02);
        }
      }
      animate();

      // カメラとセンサーの起動
      startBtn.addEventListener('click', async () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission !== 'granted') {
              alert('センサーの使用が拒否されました。設定から許可してください。');
              return;
            }
          } catch (error) {
            console.error(error);
          }
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          webcam.srcObject = stream;
        } catch (error) {
          alert('カメラへのアクセスが拒否されました。');
          return;
        }
        startScreen.style.display = 'none';
      });
    </script>
  </body>
</html>
