<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ARデジタル水族館</title>
    <!-- 通常のカメラARを強制する、安定したA-FrameとAR.jsの組み合わせ -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #welcome-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #002b49 0%, #00101e 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        color: white;
        font-family: sans-serif;
        text-align: center;
      }
      #start-btn {
        padding: 18px 40px;
        font-size: 18px;
        background: linear-gradient(135deg, #00d2ff 0%, #0066ff 100%);
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,210,255,0.4);
        margin-top: 30px;
      }
      #instructions {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 16, 30, 0.85);
        border: 1px solid rgba(0, 210, 255, 0.3);
        color: #e0f7fc;
        padding: 12px 24px;
        border-radius: 25px;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 999;
        text-align: center;
        pointer-events: none;
        display: none;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <!-- スタート画面 -->
    <div id="welcome-screen">
      <h1 style="margin: 0 20px; font-size: 26px; letter-spacing: 2px;">ARデジタルいけす</h1>
      <p style="font-size: 14px; color: #8ec5fc; margin: 15px 30px; line-height: 1.6;">
        カメラをかざして、泳ぎ回るタイを探してみよう！
      </p>
      <button id="start-btn">デジタルいけすに入る</button>
    </div>

    <!-- 案内表示 -->
    <div id="instructions">光るパスの上を泳ぐタイをスマホで追いかけよう！</div>

    <!-- 
      VRモード関連を完全に排除 (vr-mode-ui="enabled: false")。
      AR.jsのwebcam機能で、1画面のカメラ映像を常に強制します。
    -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
      </a-assets>

      <!-- 
        カメラから少し前方（position="0 -0.8 -2"）に空間パスとタイを固定配置 
      -->
      <a-entity id="aquarium-space" position="0 -0.8 -2" visible="false">
        
        <!-- タイの3Dモデル -->
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="0.12 0.12 0.12" 
          position="0 0 0">
        </a-entity>

        <!-- 光るネオンブルーのパス -->
        <a-ring color="#00f0ff" rotation="-90 0 0" radius-inner="1.19" radius-outer="1.2" material="shader: flat; opacity: 0.7;"></a-ring>
        <a-ring color="#0077ff" rotation="-90 0 0" radius-inner="1.16" radius-outer="1.17" material="shader: flat; opacity: 0.3;"></a-ring>

      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const welcomeScreen = document.querySelector('#welcome-screen');
      const startBtn = document.querySelector('#start-btn');
      const aquariumSpace = document.querySelector('#aquarium-space');
      const instructions = document.querySelector('#instructions');
      const fish = document.querySelector('#my-fish');
      
      let angle = 0;
      const pathRadius = 1.18; 

      startBtn.addEventListener('click', () => {
        // スタートボタンを押した瞬間に画面を1画面カメラに切り替える
        welcomeScreen.style.display = 'none';
        instructions.style.display = 'block';
        aquariumSpace.setAttribute('visible', 'true');
      });

      // 泳ぎ＆くねくねアニメーション
      function animate() {
        requestAnimationFrame(animate);

        if (fish && fish.object3D && aquariumSpace.getAttribute('visible') === 'true') {
          angle += 0.012;

          // 軌道に沿って移動
          fish.object3D.position.x = Math.cos(angle) * pathRadius;
          fish.object3D.position.z = Math.sin(angle) * pathRadius;

          // 本物の魚らしいくねくねモーション
          const wiggle = Math.sin(angle * 12) * 0.09;
          fish.object3D.rotation.y = -angle + Math.PI / 2 + wiggle;
        }
      }

      animate();
    </script>
  </body>
</html>
