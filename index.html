<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360度 デジタル水族館</title>
    <!-- A-Frameとアニメーション用のライブラリのみを使用（不安定なAR.jsは完全に排除） -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
      
      /* 現実のカメラ映像を背景として全画面に敷き詰める */
      #webcam-bg {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      /* ARの3D空間をカメラ映像の上に透明に重ねる */
      #ar-scene-container {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 2;
      }

      /* スタート画面（カメラとセンサーの許可を取るための必須UI） */
      #start-screen {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0, 20, 40, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 40px;
        font-size: 18px;
        background: #00a2ff;
        color: white;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,162,255,0.5);
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- 1. 現実のカメラ背景 -->
    <video id="webcam-bg" autoplay playsinline muted></video>

    <!-- 2. スタート画面 -->
    <div id="start-screen">
      <h2 style="margin-bottom: 10px;">デジタル水族館</h2>
      <p style="font-size: 14px; color: #aaa; margin-bottom: 30px;">
        ※カメラとセンサーの許可が必要です
      </p>
      <button id="start-btn">スタート</button>
    </div>

    <!-- 3. A-Frameの3D空間（透明） -->
    <div id="ar-scene-container">
      <a-scene 
        embedded 
        renderer="alpha: true; colorManagement: true; precision: high; antialias: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
          <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
        </a-assets>

        <!-- スマホの動き（ジャイロ）と連動するカメラ -->
        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: false; mouseEnabled: false;"></a-entity>

        <!-- タイ（ユーザーの周囲を泳ぎ回る） -->
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="0.12 0.12 0.12" 
          animation-mixer>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>
      </a-scene>
    </div>

    <script>
      const startBtn = document.getElementById('start-btn');
      const startScreen = document.getElementById('start-screen');
      const webcam = document.getElementById('webcam-bg');
      const fish = document.querySelector('#my-fish');
      const sceneEl = document.querySelector('a-scene');

      // 画質＆透けバグ修正（先ほどと同じ高品質化処理）
      fish.addEventListener('model-loaded', () => {
        const mesh = fish.getObject3D('mesh');
        if (mesh) {
          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material.side = THREE.DoubleSide;
              node.material.transparent = false;
              node.material.depthWrite = true;
              if (node.material.map) {
                node.material.map.minFilter = THREE.LinearMipmapLinearFilter;
                node.material.map.magFilter = THREE.LinearFilter;
                node.material.map.needsUpdate = true;
              }
              node.material.needsUpdate = true;
            }
          });
        }
      });

      // 遊泳アニメーション（ユーザーから半径2.5メートルの円周上をぐるぐる泳ぐ）
      let angle = 0;
      const orbitRadius = 2.5;

      function animate() {
        requestAnimationFrame(animate);
        if (fish && fish.object3D) {
          angle += 0.008; // 泳ぐスピード

          // あなたを中心に、半径2.5mの距離を泳ぎ回る
          fish.object3D.position.x = Math.cos(angle) * orbitRadius;
          fish.object3D.position.z = Math.sin(angle) * orbitRadius;
          
          // 魚の上下の揺らぎ（ゆったりと昇り降りする）
          fish.object3D.position.y = Math.sin(angle * 4) * 0.3;

          // 常に円の進行方向を向く
          fish.object3D.rotation.y = -angle + Math.PI / 2;
        }
      }
      animate();

      // スタートボタンを押した時の処理（カメラとセンサーを起動）
      startBtn.addEventListener('click', async () => {
        // 1. スマホの傾きセンサー（ジャイロ）の許可を取る
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission !== 'granted') {
              alert('センサーの使用が拒否されました。設定から許可してください。');
              return;
            }
          } catch (error) {
            console.error(error);
          }
        }

        // 2. スマホの背面カメラ映像を取得して背景に流す
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          webcam.srcObject = stream;
        } catch (error) {
          alert('カメラへのアクセスが拒否されました。');
          return;
        }

        // 3. UIを消して水族館スタート
        startScreen.style.display = 'none';
      });
    </script>
  </body>
</html>
