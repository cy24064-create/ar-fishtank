<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ARいけす</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 9999;
        text-align: center;
        pointer-events: none;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <div id="instructions">スマホをテーブルにかざしてください</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
      </a-assets>

      <!-- 
        【いけすグループの位置調整】
        position="0 -0.5 -2.5" ➔ カメラから2.5メートル奥、少し下（机の上あたり）に配置します
      -->
      <a-entity id="aquarium-group" position="0 -0.5 -2.5">
        
        <!-- 
          【タイの大きさを縮小】
          scale="0.01 0.01 0.01" ➔ 元のモデルが巨大すぎるため、1/100のサイズに縮小してテーブルサイズにします
        -->
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="0.01 0.01 0.01" 
          position="0 0 0">
        </a-entity>

        <!-- いけすの青いリング（こちらも魚のサイズに合わせて少しコンパクトに調整） -->
        <a-ring color="#00a2ff" rotation="-90 0 0" radius-inner="0.6" radius-outer="0.62" opacity="0.5"></a-ring>

      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const fish = document.querySelector('#my-fish');
      let angle = 0;

      function animate() {
        requestAnimationFrame(animate);

        if (fish && fish.object3D) {
          angle += 0.02; // 泳ぐスピードを少しだけアップ

          // 半径0.5メートルの円を描いて、いけすのリングに沿って泳がせます
          fish.object3D.position.x = Math.cos(angle) * 0.5;
          fish.object3D.position.z = Math.sin(angle) * 0.5;

          // 魚が円の進行方向（常に前）を向いて泳ぐようにします
          fish.object3D.rotation.y = -angle + Math.PI / 2;
        }
      }

      animate();
    </script>
  </body>
</html>
