<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ARいけす</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 9999;
        text-align: center;
        pointer-events: none;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <div id="instructions">スマホをテーブルにかざしてください</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="fish-model" src="tai.glb"></a-asset-item>
      </a-assets>

      <!-- いけす全体の配置位置：カメラから2.5m奥、少し下に設定 -->
      <a-entity id="aquarium-group" position="0 -0.5 -2.5">
        
        <!-- 
          【タイのサイズ変更】
          scaleを「0.1」に設定し、テーブルの上にちょうどいい、存在感のある鯛の大きさにします。
        -->
        <a-entity 
          id="my-fish" 
          gltf-model="#fish-model" 
          scale="0.1 0.1 0.1" 
          position="0 0 0">
        </a-entity>

        <!-- いけすの範囲を示す青い光のリング（半径1.5メートルに拡大） -->
        <a-ring color="#00a2ff" rotation="-90 0 0" radius-inner="1.5" radius-outer="1.52" opacity="0.4"></a-ring>

      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const fish = document.querySelector('#my-fish');
      
      // 🐟 自律遊泳パラメータ
      let posX = 0;       // 現在のX位置
      let posZ = 0;       // 現在のZ位置
      let speed = 0.008;  // 泳ぐスピード
      let direction = Math.random() * Math.PI * 2; // 進む方角（ラジアン）
      let turnSpeed = 0;  // 旋回スピード
      const limitRadius = 1.4; // 泳ぎ回るいけすの境界半径（リングの内側で留まるようにする）

      function animate() {
        requestAnimationFrame(animate);

        if (fish && fish.object3D) {
          
          // 1. 少しずつ進む方向をランダムに揺らす（本物の魚らしいフラフラ感を出す）
          turnSpeed += (Math.random() - 0.5) * 0.05;
          turnSpeed = Math.max(-0.05, Math.min(0.05, turnSpeed)); // 急旋回しすぎないように制限
          direction += turnSpeed;

          // 2. 現在の向きに向かって進む
          posX += Math.cos(direction) * speed;
          posZ += Math.sin(direction) * speed;

          // 3. いけすの境界（リングの端）に近づいたら、自動的に中央に戻るように方向転換する
          const distanceFromCenter = Math.sqrt(posX * posX + posZ * posZ);
          if (distanceFromCenter > limitRadius) {
            // 中心を向く角度を計算
            const angleToCenter = Math.atan2(-posZ, -posX);
            // なめらかに中央に向きを変える
            direction = angleToCenter + (Math.random() - 0.5) * 0.5;
            turnSpeed = 0; // 旋回をリセット
          }

          // 4. 魚の位置を更新
          fish.object3D.position.x = posX;
          fish.object3D.position.z = posZ;

          // 5. 進行方向に魚の頭を向ける（※タイの3Dモデルの向きに合わせて「-direction」で調整しています）
          // もし頭の向きが逆を向く場合は、「+ Math.PI」などを追加して調整します
          fish.object3D.rotation.y = -direction + Math.PI / 2;
        }
      }

      animate();
    </script>
  </body>
</html>
